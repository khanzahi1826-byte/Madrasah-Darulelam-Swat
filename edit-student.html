<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طالب علم میں ترمیم کریں - ایڈمن پینل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <div class="admin-wrapper">
        <aside class="sidebar">
            <h2>ایڈمن پینل</h2>
            <ul>
                <li><a href="admin.html"><i class="fa fa-tachometer-alt"></i> ڈیش بورڈ</a></li>
                <li><a href="students.html" class="active"><i class="fa fa-users"></i> طلباء</a></li>
                <li><a href="#"><i class="fa fa-book-open"></i> کورسز</a></li>
                <li><a href="#"><i class="fa fa-money-bill-wave"></i> فیس</a></li>
                <li><a href="#"><i class="fa fa-bullhorn"></i> اعلانات</a></li>
            </ul>
        </aside>
        <main class="main-content">
            <header>
                <h1>طالب علم کی معلومات میں ترمیم کریں</h1>
            </header>
            <div class="form-container">
                <form id="edit-student-form">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="name">نام</label>
                            <input type="text" id="name" required>
                        </div>
                        <div class="form-group">
                            <label for="father-name">والد کا نام</label>
                            <input type="text" id="father-name" required>
                        </div>
                        <div class="form-group">
                            <label for="dob">تاریخ پیدائش</label>
                            <input type="date" id="dob" required>
                        </div>
                        <div class="form-group">
                            <label for="department">شعبہ</label>
                            <input type="text" id="department" required>
                        </div>
                         <div class="form-group">
                            <label for="cnic">شناختی کارڈ نمبر</label>
                            <input type="text" id="cnic">
                        </div>
                        <div class="form-group">
                            <label for="mobile">موبائل نمبر</label>
                            <input type="tel" id="mobile">
                        </div>
                        <div class="form-group full-width">
                            <label for="perm-address">مستقل پتہ</label>
                            <textarea id="perm-address"></textarea>
                        </div>
                        <div class="form-group full-width">
                            <label for="temp-address">عارضی پتہ</label>
                            <textarea id="temp-address"></textarea>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn">اپ ڈیٹ کریں</button>
                        <a href="students.html" class="btn btn-secondary">منسوخ کریں</a>
                    </div>
                </form>
            </div>
        </main>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const studentId = Number(urlParams.get('id'));
            const form = document.getElementById('edit-student-form');

            if (!studentId) {
                alert('طالب علم کا ID فراہم نہیں کیا گیا۔');
                window.location.href = 'students.html';
                return;
            }

            let students = JSON.parse(localStorage.getItem('students')) || [];
            const student = students.find(s => s.id === studentId);

            if (!student) {
                alert('اس ID کے ساتھ کوئی طالب علم نہیں ملا۔');
                window.location.href = 'students.html';
                return;
            }

            // Populate form
            document.getElementById('name').value = student.name;
            document.getElementById('father-name').value = student.fatherName;
            document.getElementById('dob').value = student.dob;
            document.getElementById('department').value = student.department;
            document.getElementById('cnic').value = student.cnic || '';
            document.getElementById('mobile').value = student.mobile || '';
            document.getElementById('perm-address').value = student.permAddress || '';
            document.getElementById('temp-address').value = student.tempAddress || '';

            form.addEventListener('submit', function(e) {
                e.preventDefault();

                const updatedStudent = {
                    ...student,
                    name: document.getElementById('name').value,
                    fatherName: document.getElementById('father-name').value,
                    dob: document.getElementById('dob').value,
                    department: document.getElementById('department').value,
                    cnic: document.getElementById('cnic').value,
                    mobile: document.getElementById('mobile').value,
                    permAddress: document.getElementById('perm-address').value,
                    tempAddress: document.getElementById('temp-address').value,
                };

                const studentIndex = students.findIndex(s => s.id === studentId);
                students[studentIndex] = updatedStudent;
                
                localStorage.setItem('students', JSON.stringify(students));

                alert('طالب علم کی معلومات کامیابی سے اپ ڈیٹ ہو گئی ہیں۔');
                window.location.href = 'students.html';
            });
        });
    </script>
</body>
</html>
