
<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ایڈمن لاگ ان - مدرسہ دارالعلم سوات</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&display=swap');
    :root {
        --primary-color: #004d40;
        --light-color: #f5f5f5;
        --font-family: 'Noto Nastaliq Urdu', serif;
    }
    body {
        font-family: var(--font-family);
        direction: rtl;
        background-color: var(--light-color);
        display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
    }
    .login-container { background: #fff; padding: 40px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 400px; }
    .login-container h1 { font-size: 2.5rem; color: var(--primary-color); margin-bottom: 20px; }
    .login-container p { color: #666; margin-bottom: 30px; }
    .login-form input { width: 100%; padding: 15px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; font-family: inherit; font-size: 1.1rem; box-sizing: border-box; direction: ltr; text-align: right; }
    .btn { display: inline-block; background: var(--primary-color); color: #fff; padding: 15px 30px; border-radius: 5px; text-decoration: none; font-size: 1.2rem; transition: background 0.3s ease; border: none; cursor: pointer; width: 100%; font-family: 'Noto Nastaliq Urdu', sans-serif; }
    .btn:hover { background: #00382e; }
    #error-message { color: #d93025; margin-top: 15px; display: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>ایڈمن لاگ ان</h1>
        <p>براہ کرم اپنے اسناد درج کریں۔</p>
        <form id="login-form" class="login-form">
            <input type="email" id="email" placeholder="ای میل" required value="khanzahi1826@gmail.com">
            <input type="password" id="password" placeholder="پاس ورڈ" required>
            <button type="submit" class="btn">لاگ ان کریں</button>
        </form>
        <p id="error-message"></p>
    </div>

    <!-- Firebase Libraries -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <!-- Firebase Config -->
    <script src="firebase.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('login-form');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const errorMessage = document.getElementById('error-message');

            // اگر صارف پہلے سے لاگ ان ہے تو اسے ایڈمن پینل پر بھیج دیں۔
            firebase.auth().onAuthStateChanged((user) => {
                if (user) {
                    // صارف لاگ ان ہے۔ ہم اسے تھوڑی دیر بعد بھیجیں گے تاکہ اگر وہ لاگ آؤٹ کرنا چاہے تو کر سکے۔
                    setTimeout(() => {
                         window.location.href = 'admin.html';
                    }, 500);
                }
            });

            if(loginForm) {
                loginForm.addEventListener('submit', (event) => {
                    event.preventDefault();
                    errorMessage.style.display = 'none';

                    const email = emailInput.value;
                    const password = passwordInput.value;

                    firebase.auth().signInWithEmailAndPassword(email, password)
                        .then((userCredential) => {
                            // کامیاب لاگ ان
                            window.location.href = 'admin.html';
                        })
                        .catch((error) => {
                            // خرابی کو سنبھالیں۔
                            console.error("Login Error:", error);
                            errorMessage.textContent = 'ای میل یا پاس ورڈ غلط ہے۔';
                            errorMessage.style.display = 'block';
                        });
                });
            }
        });
    </script>
</body>
</html>
