<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ایڈمن لاگ ان - مدرسہ دارالعلم سوات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&display=swap');
    :root {
        --primary-color: #004d40;
        --secondary-color: #d4af37;
        --light-color: #f5f5f5;
        --font-family: 'Noto Nastaliq Urdu', serif;
    }
    body {
        font-family: var(--font-family);
        direction: rtl;
        background-color: var(--light-color);
        display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
    }
    .login-container { background: #fff; padding: 40px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 400px; }
    .login-container h1 { font-size: 2.5rem; color: var(--primary-color); margin-bottom: 20px; }
    .login-container p { color: #666; margin-bottom: 30px; }
    .login-form input { width: 100%; padding: 15px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; font-family: inherit; font-size: 1.1rem; box-sizing: border-box; direction: ltr; text-align: right; }
    .btn { display: inline-block; background: var(--primary-color); color: #fff; padding: 15px 30px; border-radius: 5px; text-decoration: none; font-size: 1.2rem; transition: background 0.3s ease; border: none; cursor: pointer; width: 100%; font-family: 'Noto Nastaliq Urdu', sans-serif; }
    .btn:hover { background: #00382e; }
    .divider { text-align: center; margin: 20px 0; color: #888; position: relative; }
    .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background-color: #ccc; }
    .divider::before { right: 0; }
    .divider::after { left: 0; }
    .google-btn { background-color: #4285F4; color: white; }
    .google-btn:hover { background-color: #357ae8; }
    .google-btn .fab { margin-left: 10px; }
    #error-message { color: #d93025; margin-top: 15px; display: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>ایڈمن لاگ ان</h1>
        <p>براہ کرم اپنے اسناد درج کریں۔</p>
        <form id="login-form" class="login-form">
            <input type="email" id="email" placeholder="ای میل" required>
            <input type="password" id="password" placeholder="پاس ورڈ" required>
            <button type="submit" class="btn">لاگ ان کریں</button>
        </form>
        <p id="error-message"></p>
        <div class="divider">یا</div>
        <button id="google-signin-btn" class="btn google-btn"><i class="fab fa-google"></i> گوگل کے ساتھ لاگ ان کریں</button>
    </div>

    <!-- Firebase Libraries -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <!-- Firebase Config -->
    <script src="firebase.js"></script>

    <script>
        const loginForm = document.getElementById('login-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('error-message');
        const googleSignInBtn = document.getElementById('google-signin-btn');
        
        const authorizedEmail = 'khanzahi1826@gmail.com';

        // Function to handle successful login
        const handleLogin = (user) => {
            if (user.email === authorizedEmail) {
                window.location.href = 'admin.html';
            } else {
                firebase.auth().signOut();
                errorMessage.textContent = 'آپ اس اکاؤنٹ سے لاگ ان کرنے کے مجاز نہیں ہیں۔';
                errorMessage.style.display = 'block';
            }
        };

        // Function to handle login errors
        const handleError = (error) => {
            if (error.code === 'auth/user-not-found') {
                 // If user is not found, try to create a new user
                const email = emailInput.value;
                const password = passwordInput.value;
                if(email === authorizedEmail) { // Only create the authorized user
                    firebase.auth().createUserWithEmailAndPassword(email, password)
                        .then(userCredential => handleLogin(userCredential.user))
                        .catch(creationError => {
                             errorMessage.textContent = "اکاؤنٹ بنانے میں خرابی: " + creationError.message;
                             errorMessage.style.display = 'block';
                        });
                } else {
                    errorMessage.textContent = "ای میل یا پاس ورڈ غلط ہے۔";
                    errorMessage.style.display = 'block';
                }
            } else if (error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                errorMessage.textContent = "ای میل یا پاس ورڈ غلط ہے۔";
                errorMessage.style.display = 'block';
            } else {
                errorMessage.textContent = "لاگ ان کے دوران ایک خرابی پیش آئی۔";
                errorMessage.style.display = 'block';
            }
            console.error("Login/Creation Error:", error);
        };

        // Email/Password Login
        loginForm.addEventListener('submit', function(event) {
            event.preventDefault();
            errorMessage.style.display = 'none';
            firebase.auth().signInWithEmailAndPassword(emailInput.value, passwordInput.value)
                .then(userCredential => handleLogin(userCredential.user))
                .catch(handleError);
        });

        // Google Sign-In
        googleSignInBtn.addEventListener('click', () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            errorMessage.style.display = 'none';

            firebase.auth().signInWithPopup(provider)
                .then((result) => handleLogin(result.user))
                .catch((error) => {
                    errorMessage.textContent = 'گوگل لاگ ان کے دوران ایک خرابی پیش آئی۔';
                    errorMessage.style.display = 'block';
                    console.error("Google Sign-In Error:", error);
                });
        });
    </script>
</body>
</html>
