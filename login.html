<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ایڈمن لاگ ان - مدرسہ دارالعلم سوات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&display=swap');
    :root {
        --primary-color: #004d40;
        --secondary-color: #d4af37;
        --light-color: #f5f5f5;
        --dark-color: #212121;
        --font-family: 'Noto Nastaliq Urdu', serif;
    }
    body {
        font-family: var(--font-family);
        direction: rtl;
        background-color: var(--light-color);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    .login-container {
        background: #fff;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        text-align: center;
        width: 100%;
        max-width: 400px;
    }
    .login-container h1 {
        font-size: 2.5rem;
        color: var(--primary-color);
        margin-bottom: 20px;
    }
    .login-container p {
        color: #666;
        margin-bottom: 30px;
    }
    .login-form input {
        width: 100%;
        padding: 15px;
        margin-bottom: 20px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-family: inherit;
        font-size: 1.1rem;
        box-sizing: border-box;
        direction: ltr; /* Email and password fields are better LTR */
        text-align: right;
    }
    .btn {
        display: inline-block;
        background: var(--primary-color);
        color: #fff;
        padding: 15px 30px;
        border-radius: 5px;
        text-decoration: none;
        font-size: 1.2rem;
        transition: background 0.3s ease;
        border: none;
        cursor: pointer;
        width: 100%;
        font-family: 'Noto Nastaliq Urdu', sans-serif;
    }
    .btn:hover {
        background: #00382e;
    }
    #error-message {
        color: #d93025;
        margin-top: 15px;
        display: none; /* Hidden by default */
    }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>ایڈمن لاگ ان</h1>
        <p>براہ کرم اپنے اسناد درج کریں۔</p>
        <form id="login-form" class="login-form">
            <input type="email" id="email" placeholder="ای میل" required>
            <input type="password" id="password" placeholder="پاس ورڈ" required>
            <button type="submit" class="btn">لاگ ان کریں</button>
        </form>
        <p id="error-message"></p> <!-- Error message will be set by JS -->
    </div>

    <!-- Firebase Libraries -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <!-- Firebase Config -->
    <script src="firebase.js"></script>

    <script>
        const loginForm = document.getElementById('login-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('error-message');

        loginForm.addEventListener('submit', function(event) {
            event.preventDefault();
            const email = emailInput.value;
            const password = passwordInput.value;
            
            errorMessage.style.display = 'none'; // Hide error on new attempt

            firebase.auth().signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // Signed in 
                    window.location.href = 'admin.html';
                })
                .catch((error) => {
                    let message = "لاگ ان کے دوران خرابی پیش آئی۔";
                    if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                        message = "ای میل یا پاس ورڈ غلط ہے۔";
                    } else if (error.code === 'auth/invalid-email') {
                        message = "ای میل کا فارمیٹ غلط ہے۔";
                    }
                    errorMessage.textContent = message;
                    errorMessage.style.display = 'block';
                    console.error("Login Error:", error);
                });
        });
    </script>
</body>
</html>
